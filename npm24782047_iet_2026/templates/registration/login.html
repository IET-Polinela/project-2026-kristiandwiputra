{% extends 'base.html' %}

{% block title %}LOGIN - Smart City Lampung{% endblock %}

{% block content %}
<style>
    /* Mengamankan Card agar benar-benar Glassmorphism tingkat tinggi */
    .auth-card {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(56, 189, 248, 0.2);
        border-top: 3px solid #38bdf8; /* Aksen neon cyan di atas */
        border-radius: 16px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(56, 189, 248, 0.05);
    }

    /* MEMBUNUH WARNA PUTIH PADA INPUT BROWSER */
    .auth-input {
        background-color: rgba(2, 6, 23, 0.6) !important;
        border: 1px solid rgba(56, 189, 248, 0.3) !important;
        color: #38bdf8 !important;
        padding: 14px 16px !important;
        min-height: 52px;
        font-size: 1rem;
        font-family: 'JetBrains Mono', monospace;
        border-left: none !important; /* Agar menyatu dengan kotak icon */
        border-top-right-radius: 8px !important;
        border-bottom-right-radius: 8px !important;
        box-shadow: none !important;
    }

    /* FIX BUG TULISAN: Placeholder dibuat lebih terang (opacity 0.6) */
    .auth-input::placeholder {
        color: rgba(56, 189, 248, 0.6) !important; 
    }

    /* Box Icon di sebelah kiri Input */
    .auth-icon-box {
        background-color: rgba(2, 6, 23, 0.6) !important;
        border: 1px solid rgba(56, 189, 248, 0.3) !important;
        border-right: none !important; /* Menghilangkan garis tengah */
        color: rgba(56, 189, 248, 0.8) !important;
        min-height: 52px;
        border-top-left-radius: 8px !important;
        border-bottom-left-radius: 8px !important;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 50px; /* Diperlebar agar icon tidak sesak */
        font-size: 1.2rem;
        transition: all 0.3s ease;
    }

    /* FIX BUG BENTUK (SEAMLESS INPUT): Efek menyala bersamaan saat kotak di-klik */
    .input-group:focus-within .auth-icon-box,
    .input-group:focus-within .auth-input {
        border-color: #38bdf8 !important;
        background-color: rgba(2, 6, 23, 0.95) !important;
        color: #38bdf8 !important;
    }
    
    /* Tambahan efek glow tipis saat focus */
    .input-group:focus-within {
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
        border-radius: 8px;
    }

    /* Fix autofill browser (Mencegah Chrome mengubah form jadi putih/kuning) */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px #020617 inset !important;
        -webkit-text-fill-color: #38bdf8 !important;
        transition: background-color 5000s ease-in-out 0s;
    }

    /* Tombol Eksekusi bergaya Cyber */
    .btn-cyber {
        background: rgba(56, 189, 248, 0.1);
        color: #38bdf8;
        border: 1px solid #38bdf8;
        border-radius: 8px;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .btn-cyber:hover {
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
        color: #020617;
        background: #38bdf8;
        transform: translateY(-2px);
    }
</style>

<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-12 col-md-6 col-lg-5 animate-enter">
        <div class="auth-card overflow-hidden">
            
            <div class="p-4 text-center border-bottom" style="border-color: rgba(255,255,255,0.05) !important;">
                <div class="mb-3">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle" style="width: 85px; height: 85px; background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.4);">
                        <i class="bi bi-shield-lock-fill text-info" style="font-size: 2.5rem; filter: drop-shadow(0 0 10px #38bdf8);"></i>
                    </div>
                </div>
                <h3 class="text-white fw-bold mb-1" style="font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;">SYSTEM_AUTH</h3>
                <p class="small mb-0" style="color: #94a3b8; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px;">
                    NODE: <span class="text-info">SMART_CITY_LP_2.0</span>
                </p>
            </div>

            <div class="card-body p-4 p-md-5">
                <form method="post" autocomplete="off">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="id_username" class="form-label text-info small fw-bold" style="font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;">
                            USERNAME
                        </label>
                        <div class="input-group">
                            <span class="input-group-text auth-icon-box"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" id="id_username" class="form-control auth-input" placeholder="Masukkan ID akses..." required autocomplete="off">
                        </div>
                    </div>

                    <div class="mb-5">
                        <label for="id_password" class="form-label text-info small fw-bold" style="font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;">
                            PASSWORD
                        </label>
                        <div class="input-group">
                            <span class="input-group-text auth-icon-box"><i class="bi bi-key"></i></span>
                            <input type="password" name="password" id="id_password" class="form-control auth-input" placeholder="••••••••" required autocomplete="new-password">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-cyber w-100 py-3 mb-4">
                        <i class="bi bi-box-arrow-in-right me-2"></i> EXECUTE_LOGIN
                    </button>

                    <div class="text-center">
                        <p class="small" style="color: #cbd5e1;">
                            Belum memiliki akses? <br>
                            <a href="{% url 'register' %}" class="text-warning fw-bold text-decoration-none mt-1 d-inline-block" style="letter-spacing: 0.5px; transition: color 0.2s;">
                                Registrasi Citizen Baru
                            </a>
                        </p>
                    </div>
                </form>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
