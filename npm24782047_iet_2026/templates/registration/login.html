<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #eef4ff, #f8f9fa);
            min-height: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd, #4f8cff);
            color: white;
            padding: 22px;
            text-align: center;
        }
        .form-control {
            border-radius: 12px;
            padding: 10px 12px;
        }
        .btn-primary {
            border-radius: 12px;
            padding: 10px 14px;
            font-weight: 600;
        }
        ul.errorlist {
            margin: 0 0 10px 0;
            padding-left: 18px;
            color: #dc3545;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card login-card">
                <div class="login-header">
                    <h2 class="mb-1">Login</h2>
                    <p class="mb-0 small">Masuk ke sistem laporan Smart City</p>
                </div>

                <div class="card-body p-4">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-info">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    {% if form.non_field_errors %}
                        <div class="alert alert-danger">
                            {{ form.non_field_errors }}
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="{{ form.username.id_for_label }}" class="form-label fw-semibold">Username</label>
                            <input type="text" name="username" id="{{ form.username.id_for_label }}" class="form-control" value="{{ form.username.value|default:'' }}">
                        </div>

                        <div class="mb-4">
                            <label for="{{ form.password.id_for_label }}" class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" id="{{ form.password.id_for_label }}" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Login</button>

                        <div class="text-center mt-3">
                            <a href="{% url 'register' %}">Belum punya akun? Registrasi</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
