{% extends 'base.html' %}

{% block title %}AUTHENTICATE - Smart City Lampung{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <!-- Login Card with Techy Style -->
        <div class="card-custom border-0 shadow-lg overflow-hidden">
            <!-- Header bergaya Terminal Gelap -->
            <div class="p-4 text-center" style="background: #0f172a; border-bottom: 2px solid #38bdf8;">
                <div class="mb-2">
                    <i class="bi bi-shield-lock-fill text-info" style="font-size: 3rem;"></i>
                </div>
                <h3 class="text-white fw-bold mb-1" style="font-family: 'JetBrains Mono', monospace; letter-spacing: -1px;">
                    ACCESS_GRANT_REQUIRED
                </h3>
                <p class="text-info opacity-75 small mb-0" style="font-family: 'JetBrains Mono', monospace;">
                    SYSTEM_ID: SMART_CITY_LP_2.0
                </p>
            </div>

            <div class="card-body p-5 bg-white">
                <form method="post" id="reportForm">
                    {% csrf_token %}

                    <!-- Username Field -->
                    <div class="mb-4">
                        <label for="id_username" class="form-label fw-bold text-muted small" style="font-family: 'JetBrains Mono', monospace;">
                            <i class="bi bi-person-fill me-1"></i> USER_IDENTITY
                        </label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-at text-primary"></i></span>
                            <input type="text" name="username" id="id_username" class="form-control bg-light border-start-0" placeholder="Username" required>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-bold text-muted small" style="font-family: 'JetBrains Mono', monospace;">
                            <i class="bi bi-key-fill me-1"></i> ACCESS_ENCRYPTION_KEY
                        </label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-primary"></i></span>
                            <input type="password" name="password" id="id_password" class="form-control bg-light border-start-0" placeholder="••••••••" required>
                        </div>
                    </div>

                    <!-- Submit Button bergaya Executor -->
                    <div class="d-grid gap-2">
                        <button type="submit" id="submitBtn" class="btn btn-primary py-3 fw-bold">
                            <i class="bi bi-unlock-fill me-2"></i> EXECUTE_LOGIN
                        </button>
                    </div>

                    <!-- Link Registrasi -->
                    <div class="text-center mt-4">
                        <p class="text-muted small">
                            New user? 
                            <a href="{% url 'register' %}" class="text-info fw-bold text-decoration-none">Create_System_Account</a>
                        </p>
                    </div>
                </form>
            </div>
            
            <!-- Footer Aksen Garis -->
            <div class="py-2 bg-light text-center border-top">
                <span class="text-muted" style="font-size: 10px; font-family: 'JetBrains Mono', monospace;">
                    SECURE_CONNECTION_ESTABLISHED // {{ now|date:"Y" }}
                </span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
