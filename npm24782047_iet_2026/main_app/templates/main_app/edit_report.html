{% extends 'base.html' %}

{% block title %}Edit Laporan{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb mb-3">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
        <li class="breadcrumb-item active" aria-current="page">Edit Laporan</li>
    </ol>
</nav>

<div class="card card-custom">
    <div class="soft-header">
        <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Form Edit Laporan</h4>
    </div>
    <div class="card-body p-4">
        <form method="post" id="reportForm">
            {% csrf_token %}

            <div class="mb-3">
                <label for="{{ form.title.id_for_label }}" class="form-label fw-semibold">Judul</label>
                {{ form.title }}
            </div>

            <div class="mb-3">
                <label for="{{ form.category.id_for_label }}" class="form-label fw-semibold">Kategori</label>
                {{ form.category }}
            </div>

            <div class="mb-3">
                <label for="{{ form.description.id_for_label }}" class="form-label fw-semibold">Deskripsi</label>
                {{ form.description }}
            </div>

            <div class="mb-4">
                <label for="{{ form.location.id_for_label }}" class="form-label fw-semibold">Lokasi</label>
                {{ form.location }}
            </div>

            <button type="submit" id="submitBtn" class="btn btn-warning text-dark px-4">
                <i class="bi bi-check2-square me-1"></i> Update
            </button>
            <a href="{% url 'report_list' %}" class="btn btn-secondary px-4">
                <i class="bi bi-arrow-left-circle me-1"></i> Kembali
            </a>
        </form>
    </div>
</div>
{% endblock %}
