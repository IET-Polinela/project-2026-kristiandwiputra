<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga Smart City Tracker</title>

    <script>
        const savedTheme = localStorage.getItem('portal_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        html[data-theme="light"] {
            --page-bg: #f4f7fb;
            --card-bg: #ffffff;
            --card-soft: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
            --text-soft: #64748b;
            --border-color: rgba(15, 23, 42, 0.10);
            --primary: #2563eb;
            --primary-soft: rgba(37, 99, 235, 0.10);
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #f59e0b;
            --shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
        }

        html[data-theme="dark"] {
            --page-bg: #0f172a;
            --card-bg: #172136;
            --card-soft: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --text-soft: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.18);
            --primary: #3b82f6;
            --primary-soft: rgba(59, 130, 246, 0.16);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 10px 24px rgba(0, 0, 0, 0.20);
        }

        body {
            min-height: 100vh;
            background: var(--page-bg);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body.modal-lite-open {
            overflow: hidden;
        }

        .topbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: var(--primary-soft);
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .brand-title {
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 850;
            line-height: 1.1;
        }

        .brand-subtitle {
            color: var(--text-soft);
            font-size: 0.78rem;
            font-weight: 650;
        }

        .theme-btn {
            width: 42px;
            height: 42px;
            border-radius: 13px;
            border: 1px solid var(--border-color);
            background: var(--card-soft);
            color: var(--text-main);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        #nav-menus {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        #nav-menus a,
        #nav-menus button {
            border-radius: 12px !important;
            font-weight: 750 !important;
        }

        .spa-container {
            max-width: 1280px;
            min-height: calc(100vh - 92px);
            margin: 0 auto;
            padding: 1.5rem;
        }

        .page-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .soft-card {
            background: var(--card-soft);
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }

        .section-label {
            color: var(--primary);
            font-size: 0.82rem;
            font-weight: 850;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0.45rem;
        }

        .page-title {
            color: var(--text-main);
            font-size: clamp(1.6rem, 3vw, 2.15rem);
            font-weight: 850;
            line-height: 1.15;
            margin-bottom: 0.5rem;
        }

        .page-desc {
            color: var(--text-muted);
            font-size: 0.96rem;
            line-height: 1.65;
            margin-bottom: 0;
        }

        .form-control,
        .form-select,
        .input-group-text {
            background: var(--card-bg);
            color: var(--text-main);
            border-color: var(--border-color);
        }

        .form-control:focus,
        .form-select:focus {
            background: var(--card-bg);
            color: var(--text-main);
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem var(--primary-soft);
        }

        .form-control::placeholder {
            color: var(--text-soft);
        }

        .btn-primary-custom {
            background: var(--primary);
            border: 1px solid var(--primary);
            color: #ffffff;
            border-radius: 13px;
            font-weight: 800;
            padding: 0.72rem 1rem;
        }

        .btn-primary-custom:hover {
            color: #ffffff;
            opacity: 0.92;
        }

        .btn-soft {
            background: var(--card-soft);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 13px;
            font-weight: 800;
            padding: 0.72rem 1rem;
        }

        .btn-soft:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        .text-main {
            color: var(--text-main) !important;
        }

        .text-muted-custom {
            color: var(--text-muted) !important;
        }

        .text-soft {
            color: var(--text-soft) !important;
        }

        .report-modal-layer {
            position: fixed;
            inset: 0;
            z-index: 4000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.50);
        }

        .report-modal-layer.show {
            display: flex;
        }

        .report-modal-box {
            width: min(760px, 100%);
            max-height: 88vh;
            overflow-y: auto;
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .report-modal-head {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
        }

        .report-modal-body {
            padding: 1.25rem;
        }

        .report-modal-footer {
            padding: 1.25rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .modal-close-lite {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--card-soft);
            color: var(--text-main);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close-lite:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        @media (max-width: 768px) {
            .spa-container {
                padding: 1rem;
            }

            .topbar .container-fluid {
                flex-wrap: wrap;
                gap: 0.75rem;
            }

            #nav-menus {
                width: 100%;
            }

            .report-modal-box {
                max-height: 92vh;
            }

            .report-modal-footer .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="topbar">
        <div class="container-fluid px-4 py-3 d-flex align-items-center justify-content-between">
            <a href="#dashboard" class="text-decoration-none d-flex align-items-center gap-3">
                <span class="brand-icon">
                    <i class="bi bi-buildings-fill"></i>
                </span>
                <span>
                    <span class="brand-title d-block">Smart City Portal</span>
                    <span class="brand-subtitle d-block">Portal Warga Bandar Lampung</span>
                </span>
            </a>

            <div class="d-flex align-items-center gap-2">
                <div id="nav-menus"></div>

                <button type="button" class="theme-btn" id="themeToggle" title="Ganti tema">
                    <i class="bi bi-sun" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="spa-container" id="app-content"></main>

    <div class="report-modal-layer" id="reportModal">
        <div class="report-modal-box">
            <div class="report-modal-head">
                <div>
                    <h5 class="fw-bold text-main mb-1" id="reportModalTitle">Laporan Baru</h5>
                    <div class="small text-muted-custom">Isi data laporan warga dengan lengkap.</div>
                </div>

                <button type="button" class="modal-close-lite" id="closeReportModalBtn">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <div class="report-modal-body">
                <form id="reportForm">
                    <input type="hidden" id="reportId">

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-main">Judul Laporan</label>
                        <input type="text" id="reportTitle" class="form-control" placeholder="Contoh: Jalan rusak dekat kampus" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-main">Kategori</label>
                        <select id="reportCategory" class="form-select" required>
                            <option value="">Pilih kategori</option>
                            <option value="INFRASTRUKTUR">Infrastruktur</option>
                            <option value="FASILITAS">Fasilitas</option>
                            <option value="KEAMANAN">Keamanan</option>
                            <option value="LINGKUNGAN">Lingkungan</option>
                            <option value="LAINNYA">Lainnya</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-main">Lokasi</label>
                        <input type="text" id="reportLocation" class="form-control" placeholder="Contoh: Rajabasa" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-main">Deskripsi</label>
                        <textarea id="reportDescription" class="form-control" rows="4" placeholder="Tuliskan detail laporan..." required></textarea>
                    </div>
                </form>
            </div>

            <div class="report-modal-footer">
                <button type="button" class="btn btn-soft" id="cancelReportModalBtn">
                    Batal
                </button>

                <button type="button" class="btn btn-soft" id="saveDraftBtn">
                    <i class="bi bi-save me-1"></i>
                    Simpan Draft
                </button>

                <button type="button" class="btn btn-primary-custom" id="submitReportBtn">
                    <i class="bi bi-send me-1"></i>
                    Ajukan
                </button>
            </div>
        </div>
    </div>

    <script>
        function updateThemeIcon() {
            const theme = document.documentElement.getAttribute('data-theme');
            const icon = document.getElementById('themeIcon');

            if (!icon) return;

            icon.className = theme === 'dark' ? 'bi bi-moon-stars' : 'bi bi-sun';
        }

        document.addEventListener('DOMContentLoaded', function () {
            const themeToggle = document.getElementById('themeToggle');

            updateThemeIcon();

            if (themeToggle) {
                themeToggle.addEventListener('click', function () {
                    const currentTheme = document.documentElement.getAttribute('data-theme');
                    const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';

                    document.documentElement.setAttribute('data-theme', nextTheme);
                    localStorage.setItem('portal_theme', nextTheme);
                    updateThemeIcon();
                });
            }
        });
    </script>

<script src="js/api.js?v=70"></script>
<script src="js/auth.js?v=70"></script>
<script src="js/app.js?v=70"></script>
<script src="js/router.js?v=70"></script>
</body>
</html>
